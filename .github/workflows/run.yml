name: Susung Alert Bot

# alert.py 실행 (KST 기준)
# - 평일 09:00~15:30: 10분마다 (장중)
# - 평일 07:00~08:59: 1시간마다 (장 전)
# - 평일 15:30~19:59: 1시간마다 (장 마감 후)
# - 평일 20:00~익일 06:59: 작동 안 함
# - 주말: 작동 안 함
on:
  schedule:
    # 평일 장중 (KST 09:00~15:29) 10분마다 = UTC 00:00~06:29
    - cron: '*/10 0-5 * * 1-5'
    - cron: '0,10,20 6 * * 1-5'
    
    # 평일 장 전 (KST 07:00~08:59) 1시간마다 = UTC 22:00~23:59 (전날)
    - cron: '0 22-23 * * 0-4'
    
    # 평일 장 마감 후 (KST 15:30~19:59) 1시간마다 = UTC 06:30~10:59
    - cron: '30 6 * * 1-5'
    - cron: '0 7-10 * * 1-5'
  
  workflow_dispatch:

# 워크플로우 권한 (sent_rcept_nos.json 파일 push 가능하게)
permissions:
  contents: write

concurrency:
  group: susung-alert
  cancel-in-progress: false

jobs:
  alert:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install gspread google-auth requests
          fi
      
      - name: Run Alert Bot
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python alert.py
      
      - name: Commit and push state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sent_rcept_nos.json last_update_id.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "✅ 변경사항 없음 - commit 스킵"
          else
            git commit -m "chore: update state files [skip ci]"
            git push
            echo "✅ 상태 파일 push 성공"
          fi
