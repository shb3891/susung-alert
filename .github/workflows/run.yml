name: Susung Alert Bot

on:
  schedule:
    # 평일 장중 (KST 09:00~15:29) 10분마다 = UTC 00:00~06:29
    - cron: '*/10 0-5 * * 1-5'
    - cron: '0,10,20 6 * * 1-5'
    # 평일 장 전 (KST 07:00~08:59) = UTC 22:00~23:59 (전날)
    - cron: '0 22-23 * * 0-4'
    # 평일 장 마감 후 (KST 15:30~19:59) = UTC 06:30~10:59
    - cron: '30 6 * * 1-5'
    - cron: '0 7-10 * * 1-5'
  
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: susung-alert
  cancel-in-progress: false

jobs:
  alert:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install gspread google-auth requests
          fi
      
      - name: Show working directory before alert.py
        run: |
          echo "=== 디렉토리 정보 ==="
          pwd
          echo "=== 디렉토리 내 파일들 ==="
          ls -la
          echo "=== JSON 파일 확인 ==="
          ls -la *.json 2>/dev/null || echo "JSON 파일 없음"
      
      - name: Run Alert Bot
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python alert.py
      
      - name: Show working directory after alert.py
        run: |
          echo "=== alert.py 실행 후 디렉토리 정보 ==="
          pwd
          echo "=== 디렉토리 내 파일들 ==="
          ls -la
          echo "=== JSON 파일 확인 ==="
          ls -la *.json 2>/dev/null || echo "JSON 파일 없음"
          echo "=== sent_rcept_nos.json 내용 확인 (있으면) ==="
          cat sent_rcept_nos.json 2>/dev/null || echo "파일 없음"
          echo "=== git status ==="
          git status
      
      - name: Commit and push state files
        run: |
          echo "=== git config 설정 ==="
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          echo "=== git status 확인 ==="
          git status
          
          echo "=== JSON 파일 add 시도 ==="
          # -f 옵션으로 강제 추가 (혹시 .gitignore 때문일 수 있음)
          git add -f sent_rcept_nos.json 2>&1 || echo "⚠ sent_rcept_nos.json add 실패"
          git add -f last_update_id.json 2>&1 || echo "⚠ last_update_id.json add 실패"
          
          echo "=== 스테이징 상태 확인 ==="
          git status --short
          
          if git diff --staged --quiet; then
            echo "✅ 변경사항 없음 - commit 스킵"
          else
            echo "📝 commit 진행"
            git commit -m "chore: update state files [skip ci]"
            
            echo "📤 push 진행"
            git push
            echo "✅ 상태 파일 push 성공"
          fi
